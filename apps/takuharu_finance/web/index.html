<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="たくはるファイナンス - カップル家計簿アプリ">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="たくはるファイナンス">
  <meta name="theme-color" content="#FF6B8A">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>たくはるファイナンス</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Flutter 起動中に見せる淡いピンクのローディング（アプリのブランド色に合わせる）。
       Flutter が描画を始めると #loading ごと DOM から消える。 */
    html, body { margin: 0; padding: 0; height: 100%; background: #FFF1F4; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFF1F4;
    }
    #loading .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #FFE4EC;
      border-top-color: #FF6B8A;
      border-radius: 50%;
      animation: takuharu-spin 0.9s linear infinite;
    }
    @keyframes takuharu-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Flutter がブートするまでの間だけ表示する起動インジケータ。 -->
  <div id="loading"><div class="spinner"></div></div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Flutter の最初のフレームが描画されたらローディングを消す。
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
</body>
</html>
